<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>닥터체크Pro — 가입 신청</title>

<!--
  ============================================================
  이 파일이 하는 일:
  - 새로운 사람이 닥터체크에 가입 신청하는 화면입니다.
  - 이름, 이메일, 비밀번호, 회사명, 직책을 입력하면
    Supabase에 "pending(대기중)" 상태로 저장됩니다.
  - 관리자가 승인해야 실제로 쓸 수 있어요.

  사용 방법:
  - GitHub 저장소에 이 파일을 올려두면 됩니다.
  - 주소는 예: https://yunolabsinc-blip.github.io/hospital-schedule/signup.html
  ============================================================
-->

<style>
  /* ---- 전체 페이지 스타일 ---- */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ---- 가운데 흰색 카드 ---- */
  .signup-box {
    background: white;
    border-radius: 16px;
    padding: 32px 28px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  /* ---- 로고 영역 ---- */
  .logo-area {
    text-align: center;
    padding-bottom: 24px;
    border-bottom: 1px solid #f0f0f0;
    margin-bottom: 24px;
  }
  .logo-name { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .logo-sub  { font-size: 13px; color: #888; margin-top: 4px; }

  /* ---- 섹션 제목 ---- */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: #aaa;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 20px 0 10px;
  }
  .section-title:first-of-type { margin-top: 0; }

  /* ---- 입력 필드 ---- */
  .field { margin-bottom: 14px; }

  .field label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #555;
    margin-bottom: 5px;
    font-weight: 500;
  }
  .field label .required { color: #e53e3e; font-size: 11px; }

  .field input, .field select, .field textarea {
    width: 100%;
    border: 1.5px solid #e8e8e8;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
    background: white;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: #3b82f6;
  }
  .field input.ok  { border-color: #22c55e; }
  .field input.err { border-color: #ef4444; }

  /* ---- 비밀번호 래퍼 (눈 아이콘 포함) ---- */
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 44px; }
  .pw-eye {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    cursor: pointer; font-size: 18px; color: #aaa; user-select: none;
    line-height: 1;
  }
  .pw-eye:hover { color: #555; }

  /* ---- 비밀번호 강도 바 ---- */
  .pw-strength-bar {
    height: 3px; background: #f0f0f0; border-radius: 2px;
    margin: 4px 0 2px; overflow: hidden;
  }
  .pw-strength-fill {
    height: 100%; border-radius: 2px; width: 0;
    transition: width 0.3s, background 0.3s;
  }

  /* ---- 힌트 텍스트 ---- */
  .hint { font-size: 11px; margin-top: 3px; }
  .hint.ok  { color: #22c55e; }
  .hint.err { color: #ef4444; }
  .hint.gray { color: #aaa; }

  /* ---- 직책 선택 버튼들 ---- */
  .role-buttons { display: flex; gap: 6px; }
  .role-btn {
    flex: 1; padding: 8px 4px;
    border: 1.5px solid #e8e8e8; border-radius: 8px;
    font-size: 12px; text-align: center; cursor: pointer;
    color: #888; transition: all 0.15s; background: white;
    font-family: inherit;
  }
  .role-btn.selected {
    border-color: #3b82f6; background: #eff6ff; color: #1d4ed8;
    font-weight: 500;
  }

  /* ---- 제출 버튼 ---- */
  .submit-btn {
    width: 100%; padding: 13px;
    background: #2563eb; color: white;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 20px;
    transition: background 0.15s;
    font-family: inherit;
  }
  .submit-btn:hover   { background: #1d4ed8; }
  .submit-btn:active  { background: #1e40af; }
  .submit-btn:disabled { background: #94a3b8; cursor: not-allowed; }

  /* ---- 하단 안내 ---- */
  .footer-note {
    font-size: 12px; color: #aaa;
    text-align: center; margin-top: 14px;
    line-height: 1.6;
  }
  .footer-note a { color: #3b82f6; text-decoration: none; }

  /* ---- 로딩 스피너 ---- */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- 성공/에러 메시지 박스 ---- */
  .msg-box {
    border-radius: 10px; padding: 14px 16px;
    font-size: 13px; line-height: 1.6;
    margin-top: 16px; display: none;
  }
  .msg-box.success { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
  .msg-box.error   { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
</style>
</head>

<body>
<div class="signup-box">

  <!-- 로고 -->
  <div class="logo-area">
    <div class="logo-name">닥터체크<span style="color:#2563eb;font-size:0.75em;font-weight:700;letter-spacing:-0.02em">Pro</span></div>
    <div class="logo-sub">의료 영업 전용 거래처 관리</div>
  </div>

  <!-- 가입 폼 -->
  <form id="signupForm" novalidate>

    <!-- ① 기본 정보 -->
    <p class="section-title">기본 정보</p>

    <div class="field">
      <label>이름 <span class="required">필수</span></label>
      <input type="text" id="name" placeholder="홍길동" autocomplete="name">
    </div>

    <div class="field">
      <label>이메일 <span class="required">필수</span></label>
      <input type="email" id="email" placeholder="gildong@hanmi.co.kr" autocomplete="email">
    </div>

    <!-- ② 비밀번호 -->
    <p class="section-title">비밀번호</p>

    <div class="field">
      <label>비밀번호 <span class="required">필수</span></label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="8자리 이상" autocomplete="new-password" id="password">
        <span class="pw-eye" onclick="togglePw('password', this)">👁</span>
      </div>
      <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwBar"></div></div>
      <div class="hint gray" id="pwHint">8자 이상, 숫자·특수문자 포함 권장</div>
    </div>

    <div class="field">
      <label>비밀번호 확인 <span class="required">필수</span></label>
      <div class="pw-wrap">
        <input type="password" id="passwordConfirm" placeholder="비밀번호 다시 입력" autocomplete="new-password">
        <span class="pw-eye" onclick="togglePw('passwordConfirm', this)">👁</span>
      </div>
      <div class="hint gray" id="confirmHint">비밀번호를 한 번 더 입력해주세요</div>
    </div>

    <!-- ③ 소속 정보 -->
    <p class="section-title">소속 정보</p>

    <div class="field">
      <label>회사명 <span class="required">필수</span></label>
      <input type="text" id="company" placeholder="한미약품" autocomplete="organization">
    </div>

    <div class="field">
      <label>직책</label>
      <div class="role-buttons" id="roleButtons">
        <button type="button" class="role-btn selected" data-role="영업 담당자">영업 담당자</button>
        <button type="button" class="role-btn" data-role="팀장 / 관리자">팀장 / 관리자</button>
        <button type="button" class="role-btn" data-role="기타">기타</button>
      </div>
      <input type="hidden" id="jobTitle" value="영업 담당자">
    </div>

    <div class="field">
      <label>담당 지역 / 거래처 유형 <span style="color:#aaa;font-size:11px">선택</span></label>
      <input type="text" id="region" placeholder="예: 서울 강남, 종합병원 위주">
      <div class="hint gray">관리자 검토에 도움이 됩니다</div>
    </div>

    <!-- 제출 버튼 -->
    <button type="submit" class="submit-btn" id="submitBtn">
      가입 신청
    </button>

    <!-- 안내 문구 -->
    <div class="footer-note">
      관리자 승인 후 이메일로 알려드립니다<br>
      (보통 1 영업일 이내)<br><br>
      이미 계정이 있으신가요? <a href="login.html">로그인</a>
    </div>
  </form>

  <!-- 결과 메시지 (처음엔 숨겨져 있음) -->
  <div class="msg-box success" id="successMsg">
    ✅ 가입 신청이 완료되었습니다!<br>
    관리자 승인 후 이메일(<span id="appliedEmail"></span>)로 연락드릴게요.<br>
    보통 1 영업일 이내에 처리됩니다.
  </div>
  <div class="msg-box error" id="errorMsg"></div>

</div>

<!--
  ============================================================
  Supabase 연결하기

  아래 두 줄에서 https://hslxclmezfudjgmehriy.supabase.co 과 sb_publishable_EwCNrDIsMbHp-A8LOLqgNg_HznuhiCT 를
  실제 값으로 바꿔주세요.

  찾는 방법:
  1. supabase.com → 내 프로젝트 클릭
  2. 왼쪽 메뉴 → Settings → API
  3. "Project URL" → https://hslxclmezfudjgmehriy.supabase.co 에 붙여넣기
  4. "anon public" → sb_publishable_EwCNrDIsMbHp-A8LOLqgNg_HznuhiCT 에 붙여넣기
  ============================================================
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

// ★ 여기를 수정하세요! ★
const SUPABASE_URL  = 'https://hslxclmezfudjgmehriy.supabase.co';   // 예: https://abcdefg.supabase.co
const SUPABASE_ANON = 'sb_publishable_EwCNrDIsMbHp-A8LOLqgNg_HznuhiCT'; // 예: eyJhbGci...

// Supabase 연결
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);


// ============================================================
// 비밀번호 보이기/숨기기
// ============================================================
function togglePw(inputId, eyeBtn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    eyeBtn.textContent = '🙈';
  } else {
    input.type = 'password';
    eyeBtn.textContent = '👁';
  }
}


// ============================================================
// 비밀번호 강도 체크
// ============================================================
document.getElementById('password').addEventListener('input', function() {
  const pw   = this.value;
  const bar  = document.getElementById('pwBar');
  const hint = document.getElementById('pwHint');

  // 점수 계산 (0~3점)
  let score = 0;
  if (pw.length >= 8)           score++; // 8자 이상
  if (/[0-9]/.test(pw))         score++; // 숫자 포함
  if (/[!@#$%^&*]/.test(pw))    score++; // 특수문자 포함

  // 바 색깔과 너비
  const info = [
    { width: '0%',   color: '#f0f0f0', text: '8자 이상, 숫자·특수문자 포함 권장', cls: 'gray' },
    { width: '33%',  color: '#ef4444', text: '약함 — 더 길게 만들어주세요',       cls: 'err' },
    { width: '66%',  color: '#f59e0b', text: '보통 — 특수문자를 추가하면 좋아요', cls: 'gray' },
    { width: '100%', color: '#22c55e', text: '강함 — 좋습니다!',                  cls: 'ok' },
  ][score];

  bar.style.width    = info.width;
  bar.style.background = info.color;
  hint.textContent   = info.text;
  hint.className     = 'hint ' + info.cls;

  // 비밀번호 확인도 다시 체크
  checkConfirm();
});


// ============================================================
// 비밀번호 확인 일치 체크
// ============================================================
function checkConfirm() {
  const pw      = document.getElementById('password').value;
  const confirm = document.getElementById('passwordConfirm').value;
  const hint    = document.getElementById('confirmHint');
  const input   = document.getElementById('passwordConfirm');

  if (!confirm) {
    hint.textContent = '비밀번호를 한 번 더 입력해주세요';
    hint.className   = 'hint gray';
    input.className  = '';
    return false;
  }
  if (pw === confirm) {
    hint.textContent = '✓ 비밀번호가 일치합니다';
    hint.className   = 'hint ok';
    input.className  = 'ok';
    return true;
  } else {
    hint.textContent = '✗ 비밀번호가 일치하지 않습니다';
    hint.className   = 'hint err';
    input.className  = 'err';
    return false;
  }
}
document.getElementById('passwordConfirm').addEventListener('input', checkConfirm);


// ============================================================
// 직책 버튼 선택
// ============================================================
document.getElementById('roleButtons').addEventListener('click', function(e) {
  const btn = e.target.closest('.role-btn');
  if (!btn) return;

  // 모든 버튼 선택 해제
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  // 클릭한 버튼 선택
  btn.classList.add('selected');
  // 숨겨진 input에 값 저장
  document.getElementById('jobTitle').value = btn.dataset.role;
});


// ============================================================
// 폼 제출 — 가입 신청!
// ============================================================
document.getElementById('signupForm').addEventListener('submit', async function(e) {
  e.preventDefault(); // 페이지 새로고침 방지

  // 값 가져오기
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const company  = document.getElementById('company').value.trim();
  const jobTitle = document.getElementById('jobTitle').value;
  const region   = document.getElementById('region').value.trim();

  // ---- 기본 유효성 검사 ----
  if (!name)     return showError('이름을 입력해주세요.');
  if (!email)    return showError('이메일을 입력해주세요.');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showError('이메일 형식이 올바르지 않습니다.');
  if (password.length < 8)  return showError('비밀번호는 8자 이상이어야 합니다.');
  if (!checkConfirm())       return showError('비밀번호가 일치하지 않습니다.');
  if (!company)  return showError('회사명을 입력해주세요.');

  // ---- 버튼 로딩 상태로 변경 ----
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>신청 중...';

  try {
    // ★ Supabase에 계정 만들기
    //   - signUp()은 이메일/비밀번호로 계정을 만들어요.
    //   - options.data에 추가 정보(이름, 회사명 등)를 담아 보내면
    //     우리가 만든 handle_new_user 함수가 자동으로 user_profiles에 저장해요.
    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: {
          name,
          company,
          job_title: jobTitle,
          region,
        }
      }
    });

    if (error) throw error;

    // ---- 성공! ----
    document.getElementById('signupForm').style.display = 'none';
    document.getElementById('appliedEmail').textContent = email;
    showSuccess();

  } catch (err) {
    // 에러 메시지를 한국어로 변환
    const msgs = {
      'User already registered': '이미 가입된 이메일입니다. 로그인 화면에서 로그인해주세요.',
      'Invalid email':           '이메일 형식이 올바르지 않습니다.',
      'Password should be at least 6 characters': '비밀번호는 6자 이상이어야 합니다.',
    };
    const msg = msgs[err.message] || `오류가 발생했습니다: ${err.message}`;
    showError(msg);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '가입 신청';
  }
});


// ============================================================
// 메시지 표시 함수
// ============================================================
function showSuccess() {
  document.getElementById('successMsg').style.display = 'block';
  document.getElementById('errorMsg').style.display   = 'none';
}

function showError(msg) {
  const box = document.getElementById('errorMsg');
  box.textContent    = '⚠️ ' + msg;
  box.style.display  = 'block';
  document.getElementById('successMsg').style.display = 'none';
}

</script>
</body>
</html>
